name: Oracle Auto-Apply

on:
  workflow_dispatch:
    inputs:
      roles:
        description: 'Oracle role slugs to apply to: de, da, ds, bi, se, sd, aa, aie, bia, ra, analyst — comma-separated or "all"'
        required: false
        default: 'all'
      max_apply:
        description: 'Max applications per run'
        required: false
        default: '20'
      resume_file:
        description: 'Override resume (e.g. Osborne_DE.pdf). Leave blank to auto-select based on roles.'
        required: false
        default: ''

concurrency:
  group: oracle-autoapply
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  autoapply:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Cache Playwright browser
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-v2-${{ hashFiles('requirements.txt') }}

      - name: Install Playwright browser
        run: playwright install chromium

      - name: Install Playwright system deps
        run: playwright install-deps chromium

      - name: Restore Oracle session
        env:
          ORACLE_SESSION_B64: ${{ secrets.ORACLE_SESSION_B64 }}
        run: |
          mkdir -p json
          if [ -n "$ORACLE_SESSION_B64" ]; then
            echo "$ORACLE_SESSION_B64" | base64 -d > json/oracle_auth.json
            echo "Session restored."
          else
            echo "No session found — bot will create accounts on first visit."
          fi

      - name: Clone job-assets for resume
        run: |
          git clone https://${{ secrets.GH_PAT }}@github.com/OzSpidey/job-assets.git /tmp/job-assets

          # Auto-select resume based on roles if no override provided
          ROLES="${{ github.event.inputs.roles || 'all' }}"
          RESUME_FILE="${{ github.event.inputs.resume_file }}"

          if [ -z "$RESUME_FILE" ]; then
            case "$ROLES" in
              *de*|*data_engineer*)   RESUME_FILE="Osborne_DE.pdf" ;;
              *aie*|*ds*)             RESUME_FILE="Osborne_AI.pdf" ;;
              *)                      RESUME_FILE="Osborne_BI.pdf" ;;
            esac
            echo "Auto-selected resume: ${RESUME_FILE} (roles=${ROLES})"
          fi

          if [ -f "/tmp/job-assets/${RESUME_FILE}" ]; then
            cp "/tmp/job-assets/${RESUME_FILE}" /tmp/resume.pdf
            echo "Resume copied: ${RESUME_FILE}"
          else
            echo "Error: ${RESUME_FILE} not found in job-assets"
            ls /tmp/job-assets/
            exit 1
          fi

      - name: Run Oracle Auto-Apply
        env:
          ROLES:                 ${{ github.event.inputs.roles || 'all' }}
          MAX_APPLY:             ${{ github.event.inputs.max_apply || '20' }}
          ORACLE_APPLICANT_INFO: ${{ secrets.ORACLE_APPLICANT_INFO }}
          WD_APPLICANT_INFO:     ${{ secrets.WD_APPLICANT_INFO }}
          ORACLE_PASSWORD:       ${{ secrets.ORACLE_PASSWORD }}
          ORACLE_RESUME_PATH:    /tmp/resume.pdf
          ORACLE_SESSION_B64:    ${{ secrets.ORACLE_SESSION_B64 }}
          HEADLESS:              "true"
          EMAIL_SENDER:          ${{ secrets.EMAIL_SENDER }}
          GMAIL_APP_PASSWORD:    ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_TO:              ${{ secrets.EMAIL_TO }}
          WD_VERIFY_IMAP_USER:     ${{ secrets.WD_VERIFY_IMAP_USER }}
          WD_VERIFY_IMAP_PASSWORD: ${{ secrets.WD_VERIFY_IMAP_PASSWORD }}
        run: python oracle_autoapply.py

      - name: Update session secret
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ -f json/oracle_auth.json ] && [ -n "$GH_TOKEN" ]; then
            jq '{cookies: .cookies, origins: []}' json/oracle_auth.json > json/oracle_auth_clean.json
            gh secret set ORACLE_SESSION_B64 \
              --body "$(base64 -w 0 json/oracle_auth_clean.json)" \
              --repo OzSpidey/Job_Automation
            echo "Session secret updated."
          fi

      - name: Persist applied state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add json/oracle_applied.json csv/oracle_applied.csv json/oracle_answers.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: update oracle applied jobs [skip ci]"
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push && break
            echo "Push attempt $i failed, retrying in $((i * 3))s..."
            sleep $((i * 3))
          done
