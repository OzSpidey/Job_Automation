version: "3.9"

services:
  optoz:
    build: .
    container_name: opt-oz
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./data:/data              # chain store, surfaces, sqlite db
      - ./config:/app/config:ro   # settings + universe yamls
      - ./.env:/app/.env:ro
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"   # reach TWS on host
    environment:
      - PYTHONUNBUFFERED=1
      - DATA_DIR=/data

  # Optional: run a one-off backtest
  backtest:
    build: .
    container_name: opt-oz-backtest
    profiles: ["backtest"]
    volumes:
      - ./data:/data
      - ./config:/app/config:ro
      - ./.env:/app/.env:ro
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - DATA_DIR=/data
    command: ["python", "scripts/run_backtest.py"]
