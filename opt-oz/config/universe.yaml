# ── Opt-Oz universe definition ────────────────────────────────────────────────
# The full set of underlyings the system is allowed to trade.
# Anything not in this list is categorically rejected at the portfolio layer.

etfs:
  - symbol: SPY
    name: "SPDR S&P 500 ETF"
    strategies: [vrp_straddle, iron_condor, wheel]
    min_option_volume: 10000    # minimum daily option volume (contracts)
  - symbol: QQQ
    name: "Invesco QQQ Trust"
    strategies: [vrp_straddle, iron_condor]
    min_option_volume: 5000
  - symbol: IWM
    name: "iShares Russell 2000 ETF"
    strategies: [vrp_straddle, iron_condor]
    min_option_volume: 2000
  - symbol: GLD
    name: "SPDR Gold Shares"
    strategies: [iron_condor]
    min_option_volume: 500

single_names:
  - symbol: AAPL
    name: "Apple Inc"
    strategies: [wheel, earnings_crush]
    min_option_volume: 5000
  - symbol: MSFT
    name: "Microsoft Corp"
    strategies: [wheel, earnings_crush]
    min_option_volume: 3000
  - symbol: NVDA
    name: "NVIDIA Corp"
    strategies: [wheel, earnings_crush]
    min_option_volume: 10000
  - symbol: AMZN
    name: "Amazon.com Inc"
    strategies: [wheel, earnings_crush]
    min_option_volume: 3000
  - symbol: GOOGL
    name: "Alphabet Inc"
    strategies: [earnings_crush]
    min_option_volume: 2000
  - symbol: META
    name: "Meta Platforms Inc"
    strategies: [earnings_crush]
    min_option_volume: 2000
  - symbol: TSLA
    name: "Tesla Inc"
    strategies: [earnings_crush]
    min_option_volume: 10000

dte_buckets:
  0dte:
    max_dte: 1
    strategies_allowed: []      # no 0DTE strategies in v1; too much gamma risk at retail
  weekly:
    min_dte: 2
    max_dte: 9
    strategies_allowed: [earnings_crush]
  monthly:
    min_dte: 20
    max_dte: 50
    strategies_allowed: [vrp_straddle, iron_condor, wheel]
  quarterly:
    min_dte: 51
    max_dte: 120
    strategies_allowed: []      # LEAPS not in v1

expirations:
  preferred_days_of_week: [4]   # 4 = Friday (standard monthly/weekly expiry)
  avoid_earnings_within_dte: 5  # don't hold VRP straddle through earnings
