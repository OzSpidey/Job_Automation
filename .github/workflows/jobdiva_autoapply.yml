name: JobDiva Auto-Apply

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  autoapply:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Cache Playwright browser
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-v2-${{ hashFiles('requirements.txt') }}

      - name: Install Playwright browser
        run: playwright install chromium

      - name: Install Playwright system deps
        run: playwright install-deps chromium

      - name: Download DE resume
        run: |
          git clone https://github.com/OzSpidey/job-assets.git /tmp/job-assets
          cp /tmp/job-assets/resume_de.pdf /tmp/resume_de.pdf

      - name: Run JobDiva Auto-Apply
        env:
          HEADLESS:             "true"
          APPLICANT_INFO_JSON:  ${{ secrets.APPLICANT_INFO_JSON }}
          DE_RESUME_PATH:       /tmp/resume_de.pdf
          EMAIL_SENDER:         ${{ secrets.EMAIL_SENDER }}
          GMAIL_APP_PASSWORD:   ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_TO:             ${{ secrets.EMAIL_TO }}
        run: python jobdiva_autoapply.py

      - name: Persist applied-jobs state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add jobdiva_applied_ids.json jobdiva_applied.csv 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: update jobdiva applied jobs [skip ci]"
          git pull --rebase origin main
          git push
