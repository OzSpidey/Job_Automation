name: LinkedIn Job Applier

on:
  schedule:
    # Every 2 hours on weekdays, 8am–8pm UTC (4am–4pm EST)
    - cron: '0 8-20/2 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Chrome
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" \
            | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update -q
          sudo apt-get install -y google-chrome-stable

      - name: Run LinkedIn Job Applier
        env:
          LINKEDIN_COOKIE:    ${{ secrets.LINKEDIN_COOKIE }}
          APPLICANT_INFO_JSON: ${{ secrets.APPLICANT_INFO_JSON }}
          EMAIL_SENDER:       ${{ secrets.EMAIL_SENDER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_TO:           ${{ secrets.EMAIL_TO }}
          CI: "true"
        run: python linkedin_job_applier.py

      - name: Persist state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add linkedin_applied_ids.json linkedin_jobs_applied.csv 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: update linkedin applied jobs [skip ci]"
          git pull --rebase origin main
          git push
