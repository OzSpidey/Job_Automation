name: Microsoft Jobs Scanner

on:
  schedule:
    # All times EDT (UTC-4). Shifts 1 hr in winter (EST/UTC-5).
    #
    # Every 30 min — 7:30 AM to 10:30 PM EDT
    # :30 runs  → 11:30–23:30 UTC and 00:30–02:30 UTC
    - cron: '30 11-23 * * *'
    - cron: '30 0-2 * * *'
    # :00 runs (daytime 8 AM–10 PM) + hourly overnight (11 PM–7 AM) = every UTC hour
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Cache Playwright browser
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('requirements.txt') }}

      - name: Install Playwright browser (if not cached)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: playwright install chromium

      - name: Install Playwright system deps
        run: playwright install-deps chromium

      - name: Run Microsoft Jobs Scanner
        env:
          MS_TARGET_EMAILS:   ${{ secrets.MS_TARGET_EMAILS }}
          EMAIL_SENDER:       ${{ secrets.EMAIL_SENDER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python microsoft_jobs_scanner.py

      - name: Persist seen-jobs list
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add microsoft_seen_jobs.json
          git diff --staged --quiet || git commit -m "chore: update microsoft seen jobs [skip ci]"
          git pull --rebase origin main
          git push
