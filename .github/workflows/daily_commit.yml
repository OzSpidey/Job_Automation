name: Daily Commit

on:
  schedule:
    - cron: '0 14 * * *'   # triggers daily at 10 AM ET; script handles probabilistic skipping
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout this (public) repo
        uses: actions/checkout@v4
        # Commits land on THIS public repo's default branch so they show on the
        # public contribution graph (what the profile snake reads). The built-in
        # GITHUB_TOKEN can push here and does NOT re-trigger other workflows.

      - name: Roll skip probability
        id: roll
        run: |
          DAY=$(date -u +%u)   # 1=Mon 2=Tue 3=Wed 4=Thu 5=Fri 6=Sat 7=Sun
          RAND=$((RANDOM % 100))
          if   [ "$DAY" -eq "6" ]; then THRESHOLD=80   # Sat: 80% skip
          elif [ "$DAY" -eq "7" ]; then THRESHOLD=60   # Sun: 60% skip
          else                          THRESHOLD=10   # Mon–Fri: 10% skip
          fi
          if [ $RAND -lt $THRESHOLD ]; then
            echo "skip=true"  >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Random delay
        if: steps.roll.outputs.skip == 'false'
        run: sleep $((RANDOM % 5400))   # spread commit time up to 90 min after trigger

      - name: Make 1-5 commits
        if: steps.roll.outputs.skip == 'false'
        run: |
          git config user.name "Osborne"
          git config user.email "lopes.o@northeastern.edu"

          # Weighted random count: 1-2 on most active days, 5 only occasionally.
          # A flat 1-5 (mean 3) every active day is itself a detectable pattern;
          # this bag biases toward fewer. Edit it to retune the distribution.
          BAG=(1 1 1 1 2 2 2 3 3 4 5)
          N=${BAG[$((RANDOM % ${#BAG[@]}))]}
          echo "Committing $N time(s) today"

          # Varied messages so the log doesn't read as one daily bot line.
          MSGS=(
            "chore: housekeeping"
            "chore: routine update"
            "docs: update notes"
            "chore: daily sync"
            "chore: tidy up"
            "docs: minor update"
          )

          # Backdate each commit to a random point in the past ~3h (sorted oldest
          # -> newest) so they don't all share one timestamp. Pure date math, no
          # sleeps, so this adds no runner minutes. Offsets stay within the same
          # UTC day (job runs ~14:00-15:30 UTC), so squares land on the right day.
          mkdir -p logs
          NOW=$(date -u +%s)
          OFFSETS=$(for i in $(seq 1 "$N"); do echo $((RANDOM % 10800)); done | sort -rn)
          for OFF in $OFFSETS; do
            STAMP=$(date -u -d "@$((NOW - OFF))" +"%Y-%m-%dT%H:%M:%S")
            MSG=${MSGS[$((RANDOM % ${#MSGS[@]}))]}
            echo "${STAMP}Z" >> logs/heartbeat.log
            git add logs/heartbeat.log
            GIT_AUTHOR_DATE="$STAMP" GIT_COMMITTER_DATE="$STAMP" git commit -m "$MSG"
          done

          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push && break
            sleep $((i * 3))
          done
