name: LinkedIn No-Login Scraper (Catch-up)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: OzSpidey/Job_Automation_Private
          token: ${{ secrets.PRIVATE_REPO_PAT }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 python-dotenv

      - name: Run LinkedIn no-login scraper (6-hour window)
        env:
          EMAIL_SENDER:       ${{ secrets.EMAIL_SENDER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_TO:           ${{ secrets.EMAIL_TO }}
          TIME_WINDOW:        r21600
          SCRAPER_LABEL:      Catch-Up
          MAX_PAGES_LARGE:    5
          MAX_PAGES_SMALL:    3
        run: python linkedin_nologin_scraper.py

      - name: Persist seen jobs state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add json/linkedin_nologin_seen.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: update linkedin nologin seen jobs [skip ci]"
          git checkout -- . 2>/dev/null || true
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push && break
            echo "Push attempt $i failed, retrying in $((i * 3))s..."
            sleep $((i * 3))
          done
