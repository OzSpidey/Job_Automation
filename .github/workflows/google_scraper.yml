name: Google Scraper

on:
  workflow_dispatch:

permissions:
  contents: write            # needed to commit google_api_seen_jobs.json back

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: OzSpidey/Job_Automation_Private
          token: ${{ secrets.PRIVATE_REPO_PAT }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install python-dotenv

      - name: Run Google Scraper
        env:
          EMAIL_TO:           ${{ secrets.EMAIL_TO }}
          EMAIL_SENDER:       ${{ secrets.EMAIL_SENDER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python google_scraper.py

      - name: Persist seen-jobs list
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add json/google_api_seen_jobs.json
          git diff --staged --quiet || git commit -m "chore: update google seen jobs [skip ci]"
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push && break
            echo "Push attempt $i failed, retrying in $((i * 3))s..."
            sleep $((i * 3))
          done
