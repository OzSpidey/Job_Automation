name: Workday Job Scraper

on:
  workflow_dispatch:        # trigger manually from GitHub UI or via API

permissions:
  contents: write

jobs:
  scrape-de-1:
    name: Data Engineer (1-600)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests python-dotenv
      - name: Run scraper
        env:
          EMAIL_SENDER:       ${{ secrets.EMAIL_SENDER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_TO:           ${{ secrets.EMAIL_TO }}
        run: python workday_scraper.py --role de --batch 1
      - name: Save seen-IDs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add json/workday_seen_de_1.json 2>/dev/null || true
          git add csv/workday_jobs_de_1.csv 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: update DE-1 seen jobs [skip ci]"
          git checkout -- . 2>/dev/null || true
          for i in 1 2 3 4 5; do
            git pull --rebase && git push && break
            sleep $((RANDOM % 10 + 5))
          done

