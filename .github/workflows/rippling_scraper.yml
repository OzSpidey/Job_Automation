name: Rippling Jobs Scanner

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          repository: OzSpidey/Job_Automation_Private
          token: ${{ secrets.PRIVATE_REPO_PAT }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install httpx python-dotenv

      - name: Run scraper
        env:
          EMAIL_SENDER:       ${{ secrets.EMAIL_SENDER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_TO:           ${{ secrets.EMAIL_TO }}
        run: python rippling_jobs_scanner.py

      - name: Persist state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add json/rippling_seen_jobs.json csv/rippling_jobs.csv csv/new_jobs.csv 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: update rippling seen jobs [skip ci]"
          git checkout -- . 2>/dev/null || true
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push && break
            echo "Push attempt $i failed, retrying..."
            sleep $((i * 3))
          done
