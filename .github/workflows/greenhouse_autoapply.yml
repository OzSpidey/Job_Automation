name: Greenhouse Jobs Scraper

on:
  workflow_dispatch:

concurrency:
  group: greenhouse-autoapply
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: OzSpidey/Job_Automation_Private
          token: ${{ secrets.PRIVATE_REPO_PAT }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Cache Playwright browser
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-v2-${{ hashFiles('requirements.txt') }}

      - name: Install Playwright browser
        run: playwright install chromium

      - name: Install Playwright system deps
        run: playwright install-deps chromium

      - name: Restore Greenhouse session
        env:
          GREENHOUSE_SESSION_B64: ${{ secrets.GREENHOUSE_SESSION_B64 }}
        run: |
          if [ -n "$GREENHOUSE_SESSION_B64" ]; then
            echo "$GREENHOUSE_SESSION_B64" | base64 -d > json/greenhouse_session.json
            echo "Session restored."
          else
            echo "No session secret found — run will fail if login is required."
          fi

      - name: Run Greenhouse Jobs Scraper
        env:
          EMAIL_SENDER:         ${{ secrets.EMAIL_SENDER }}
          GMAIL_APP_PASSWORD:   ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_TO:             ${{ secrets.EMAIL_TO }}
          GH_EMAIL:             ${{ secrets.GH_EMAIL }}
        run: python greenhouse_autoapply.py

      - name: Update session secret
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ -f json/greenhouse_session.json ] && [ -n "$GH_TOKEN" ]; then
            jq '{cookies: .cookies, origins: []}' json/greenhouse_session.json > json/greenhouse_session_clean.json
            gh secret set GREENHOUSE_SESSION_B64 \
              --body "$(base64 -w 0 json/greenhouse_session_clean.json)" \
              --repo OzSpidey/Job_Automation
            echo "Session secret updated."
          fi

      - name: Persist scraper state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add json/greenhouse_last_run_jobs.json csv/greenhouse_jobs.csv 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: update greenhouse seen jobs [skip ci]"
          git checkout -- . 2>/dev/null || true
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push && break
            echo "Push attempt $i failed, retrying in $((i * 3))s..."
            sleep $((i * 3))
          done
