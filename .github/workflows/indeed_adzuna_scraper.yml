name: Indeed Adzuna Scraper

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Run Adzuna scraper
        env:
          ADZUNA_APP_ID:      ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY:     ${{ secrets.ADZUNA_APP_KEY }}
          EMAIL_SENDER:       ${{ secrets.EMAIL_SENDER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_TO:           ${{ secrets.EMAIL_TO }}
        run: python indeed_adzuna_scraper.py

      - name: Persist seen jobs state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add adzuna_seen_jobs.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: update adzuna seen jobs [skip ci]"
          git pull --rebase origin main
          git push
