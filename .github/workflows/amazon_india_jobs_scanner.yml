name: Amazon India Jobs Scanner

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Cache Playwright browser
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-v2-${{ hashFiles('requirements.txt') }}

      - name: Install Playwright browser
        run: playwright install chromium

      - name: Install Playwright system deps
        run: playwright install-deps chromium

      - name: Run Amazon India Jobs Scanner
        env:
          EMAIL_TO_INDIA:     ${{ secrets.EMAIL_TO_INDIA }}
          EMAIL_SENDER:       ${{ secrets.EMAIL_SENDER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python amazon_india_jobs_scanner.py

      - name: Persist seen-jobs list
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add json/amazon_seen_jobs_india.json
          git diff --staged --quiet || git commit -m "chore: update amazon india seen jobs [skip ci]"
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push && break
            echo "Push attempt $i failed, retrying in $((i * 3))s..."
            sleep $((i * 3))
          done
