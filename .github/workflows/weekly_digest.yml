name: Weekly Jobs Digest

on:
  workflow_dispatch:        # manual trigger (dry-run by default, see input)
    inputs:
      dry_run:
        description: "Dry run (compute counts, do NOT send email)"
        type: boolean
        default: true
  schedule:
    - cron: "0 13 * * 6"    # Saturdays 13:00 UTC = 09:00 ET — sends for real

permissions:
  contents: read

jobs:
  digest:
    name: Weekly digest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: OzSpidey/Job_Automation_Private
          token: ${{ secrets.PRIVATE_REPO_PAT }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Send weekly digest
        env:
          EMAIL_SENDER:       ${{ secrets.EMAIL_SENDER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_TO:           ${{ secrets.EMAIL_TO }}
          DIGEST_DRYRUN:      ${{ github.event.inputs.dry_run }}
        run: python weekly_digest.py
