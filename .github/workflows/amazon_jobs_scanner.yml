name: Amazon Jobs Scanner

on:
  schedule:
    # All times EDT (UTC-4). Note: shifts 1 hr in winter when EST (UTC-5) kicks in.
    #
    # Every 30 min — 7:25 AM to 10:25 PM EDT (11:25–02:25 UTC, spans midnight)
    - cron: '25,55 11-23 * * *'   # 7:25 AM – 7:55 PM EDT
    - cron: '25 0-2 * * *'        # 8:25 PM – 10:25 PM EDT (:25 only for hour 2)
    - cron: '55 0-1 * * *'        # 8:55 PM –  9:55 PM EDT (stop before 10:55 PM)
    #
    # Every 3 hrs — 11 PM, 2 AM, 5 AM EDT (03:00, 06:00, 09:00 UTC)
    - cron: '0 3,6,9 * * *'
  workflow_dispatch:               # Allow manual runs from the Actions tab

permissions:
  contents: write            # Needed to commit amazon_seen_jobs.json back

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Cache Playwright browser
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('requirements.txt') }}

      - name: Install Playwright browser (if not cached)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: playwright install chromium

      - name: Install Playwright system deps
        run: playwright install-deps chromium

      - name: Run Amazon Jobs Scanner
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python amazon_jobs_scanner.py

      - name: Persist seen-jobs list
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add amazon_seen_jobs.json
          git diff --staged --quiet || git commit -m "chore: update seen jobs [skip ci]"
          git push
