name: iCIMS Job Scraper

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    name: All Companies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests python-dotenv
      - name: Run scraper
        env:
          EMAIL_SENDER:       ${{ secrets.EMAIL_SENDER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_TO:           ${{ secrets.EMAIL_TO }}
        run: python icims_scraper.py
      - name: Save seen-IDs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add json/icims_seen_jobs.json 2>/dev/null || true
          git add csv/icims_jobs.csv        2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: update icims seen jobs [skip ci]"
          git checkout -- . 2>/dev/null || true
          for i in 1 2 3 4 5; do
            git pull --rebase && git push && break
            sleep $((RANDOM % 10 + 5))
          done
