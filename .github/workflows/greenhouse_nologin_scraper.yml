name: Greenhouse No-Login Scraper

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install httpx python-dotenv

      - name: Materialize companies JSON from split secrets
        env:
          PART1: ${{ secrets.GREENHOUSE_COMPANIES_PART1 }}
          PART2: ${{ secrets.GREENHOUSE_COMPANIES_PART2 }}
        run: |
          if [ -z "$PART1" ] || [ -z "$PART2" ]; then
            echo "::error::GREENHOUSE_COMPANIES_PART1/PART2 secrets are not set."
            exit 1
          fi
          { printf '%s' "$PART1"; printf '%s' "$PART2"; } | tr -d '\n\r' | base64 -d | gunzip > greenhouse_companies.json
          python -c "import json; print('companies loaded:', len(json.load(open('greenhouse_companies.json'))))"

      - name: Run scraper
        env:
          EMAIL_SENDER:       ${{ secrets.EMAIL_SENDER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_TO:           ${{ secrets.EMAIL_TO }}
        run: python greenhouse_nologin_scraper.py

      - name: Persist state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add json/greenhouse_nologin_seen.json greenhouse_last_run_jobs.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: update greenhouse nologin seen jobs [skip ci]"
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push && break
            echo "Push attempt $i failed, retrying..."
            sleep $((i * 3))
          done
