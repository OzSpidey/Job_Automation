name: _Check Job Date

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch job posting date
        run: |
          python3 - <<'PYEOF'
          import urllib.request, json, re, time
          from datetime import datetime, timezone

          JOB_ID = "92372690618196678"
          UA = "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0 Safari/537.36"
          DS1 = re.compile(r"AF_initDataCallback\(\{key:\s*'ds:1'.*?data:(\[.*?\])\s*,\s*sideChannel", re.S)

          import urllib.parse

          def fetch_and_search(url):
              req = urllib.request.Request(url, headers={"User-Agent": UA})
              with urllib.request.urlopen(req, timeout=30) as r:
                  html = r.read().decode("utf-8", errors="replace")
              m = DS1.search(html)
              if not m:
                  return None, []
              ds1 = json.loads(m.group(1))
              raw_jobs = ds1[0] if ds1 and isinstance(ds1[0], list) else []
              return ds1, raw_jobs

          # Try page 95 (no location filter — same as user's browsing URL)
          for page in [95, 94, 96]:
              params = {"sort_by": "date", "page": str(page)}
              url = "https://www.google.com/about/careers/applications/jobs/results?" + urllib.parse.urlencode(params)
              print(f"Fetching page {page}: {url}")
              ds1, raw_jobs = fetch_and_search(url)
              if ds1 and len(ds1) > 2:
                  print(f"  Total jobs on this feed: {ds1[2]}")
              for job in raw_jobs:
                  if not isinstance(job, list) or not job:
                      continue
                  if str(job[0]) == JOB_ID:
                      print(f"  FOUND on page {page}: {job[1]}")
                      ts = job[12][0] if len(job) > 12 and isinstance(job[12], list) and job[12] else None
                      if ts:
                          dt = datetime.fromtimestamp(ts, tz=timezone.utc)
                          delta = int(time.time()) - ts
                          days  = delta // 86400
                          print(f"  Posted: {dt.strftime('%Y-%m-%d %H:%M:%S UTC')}  ({days} days ago)")
                      else:
                          print("  No timestamp found on this job")
                      exit(0)
              print(f"  Not on page {page} (fetched {len(raw_jobs)} jobs)")
              time.sleep(0.5)

          print(f"Job {JOB_ID} not found on pages 94-96 — may be filtered differently")
          PYEOF
